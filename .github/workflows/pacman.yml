name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate Pacman
        uses: platane/snk@v3
        with:
          github_user_name: AmairaniMtz5
          outputs: |
            dist/pacman-contribution-graph.svg?theme=pacman
            dist/pacman-contribution-graph-dark.svg?theme=pacman&palette=github-dark
            
      - name: Push Pacman to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
